<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>To-Do APP</title>
	</head>
	<body>

		<section class="todoapp">

			<header class="header">

				<h1>To Do APP</h1>
				<input class="new-todo" placeholder="What do you need to do?" autofocus>
			
			</header>

			<section class="main">
			
				<input id="toggle-all" class="toggle-all" type="checkbox">
				<label for="toggle-all">Mark all as complete</label>
			
				<ul class="todo-list"></ul>

			</section>

			<footer class="footer">

				<span class="todo-count"><strong>0</strong> All task(s)</span>

				<a class="filter all active" href="#/">All task(s)</a>
				<a class="filter pending" href="#/active">Pending task(s)</a>
				<a class="filter completed" href="#/completed">Complete task(s)</a>
				
				<button class="clear-completed">Deleted completed task(s)</button>
			</footer>

		</section>

	</body>
</html>
